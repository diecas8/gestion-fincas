<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Finca - Acceso</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">🌿 Mi Finca</div>
      <div class="tabs">
        <button class="tab active" data-tab="login">Iniciar sesión</button>
        <button class="tab" data-tab="register">Registrarse</button>
      </div>

      <div id="loginPanel" class="auth-panel active">
        <input id="loginEmail" type="email" class="auth-input" placeholder="Correo electrónico">
        <input id="loginPass" type="password" class="auth-input" placeholder="Contraseña">
        <button id="loginBtn" class="btn-primary">Ingresar</button>
      </div>

      <div id="registerPanel" class="auth-panel">
        <input id="regEmail" type="email" class="auth-input" placeholder="Correo electrónico">
        <input id="regPass" type="password" class="auth-input" placeholder="Contraseña (mín. 6 caracteres)">
        <button id="regBtn" class="btn-primary">Crear cuenta</button>
      </div>

      <div id="authMsg" class="msg"></div>
    </div>
  </div>

  <script>
    // Cambio de pestañas
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`${tab.dataset.tab}Panel`).classList.add('active');
        document.getElementById('authMsg').innerText = '';
      });
    });

    // Login
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value;
      if (await login(email, pass)) window.location.href = 'app.html';
    });

    // Registro
    document.getElementById('regBtn').addEventListener('click', async () => {
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPass').value;
      await register(email, pass);
    });

    // Enter key support
    document.querySelectorAll('.auth-input').forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') e.target.closest('.auth-panel').querySelector('.btn-primary').click();
      });
    });
  </script>
</body>
</html>
